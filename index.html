<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
     *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background:#f6ece7;
}

.container{
    display:flex;
    height:100vh;
}

.left{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
    background:#f6ece7;
}

.left h1{
    font-size:28px;
    font-weight:400;
    color:#c9878b;
}

.left h2{
    font-size:48px;
    font-weight:700;
    margin:10px 0;
    color:#3b2a28;
}

.left h3{
    font-size:22px;
    font-weight:500;
    color:#c9a27e;
    margin-bottom:20px;
}

.left p{
    font-size:15px;
    color:#9c6f6a;
    line-height:1.8;
    max-width:500px;
    margin-bottom:30px;
}


.button{
    width:180px;
    padding:12px 20px;
    background:#c9878b;
    color:white;
    border:none;
    border-radius:30px;
    font-size:14px;
    cursor:pointer;
    transition:0.3s ease;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.button:hover{
    background:#3b2a28;
    transform:translateY(-3px);
}

.right{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#3b2a28;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
}


.social{
    position:absolute;
    right:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.social a{
    color:#fff6f3;
    font-size:18px;
    transition:0.3s;
}

.social a:hover{
    color:#e6a8a1;
    transform:scale(1.2);
}

    </style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Hey There</h1>
        <h2>I'M Afnan</h2>
        <h3>Web Developer</h3>
        <p>
            I build clean, modern and user-focused websites. Passionate about turning ideas 
            into digital experiences that feel smooth, fast and aesthetic. 
            Currently learning, building and leveling up every single day.
        </p>
        <a href="http://127.0.0.1:5500/portt%202.html" class="button">More About Me</a>
    </div>


    <div class="right">
        <img src="123.jpg" alt="Profile Image">

        <div class="social">
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
        </div>
    </div>

</div>

</body>
</html>
